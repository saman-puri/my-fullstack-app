name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run backend lint
        run: npm run lint
        working-directory: ./backend

      - name: Run frontend lint
        run: npm run lint
        working-directory: ./frontend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend

      - name: Run frontend tests
        run: npm test
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: Show commit messages
        if: ${{ github.event_name == 'push' }}
        run: echo "${{ join(github.event.commits.*.message, ' | ') }}"

  tag_release:
    needs: [build_and_test]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump_tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump_tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch

  notify_success:
    needs: [tag_release]
    if: ${{ needs.tag_release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord about successful release
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          nodetail: true
          title: "New version deployed"
          description: |
            Repository: `${{ github.repository }}`
            Branch: `${{ github.ref_name }}`
            Version: `${{ needs.tag_release.outputs.new_tag }}`
            Commit: `${{ github.sha }}`
            Actor: `${{ github.actor }}`

  notify_failure:
    needs: [build_and_test]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord about failed build
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "Build failed"
          description: |
            Repository: `${{ github.repository }}`
            Workflow: `${{ github.workflow }}`
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Author: `${{ github.actor }}`
            Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`